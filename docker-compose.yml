services:
  falcon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: falcon:latest
    container_name: falcon-train
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - WANDB_MODE=${WANDB_MODE:-disabled}
      - DISPLAY=${DISPLAY}
    volumes:
      # FALCON source code (live mount for development)
      - .:/workspace:rw
      # X11 socket for GUI rendering
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Persistent output directories
      - ./logs:/workspace/logs
      - ./runs:/workspace/runs
      - ./outputs:/workspace/outputs
      - ./wandb:/workspace/wandb
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics]
    ipc: host
    ulimits:
      memlock: -1
    stdin_open: true
    tty: true
    working_dir: /workspace
