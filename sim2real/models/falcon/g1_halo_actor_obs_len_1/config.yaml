seed: 35
torch_deterministic: false
codebase_version: 1.0
headless: true
num_envs: 4096
auto_load_latest: false
checkpoint: null
project_name: g1_29dof_falcon
experiment_name: g1_29dof_falcon_test
base_dir: logs
timestamp: ${now:%Y%m%d_%H%M%S}
experiment_dir: ${base_dir}/${project_name}/${timestamp}-${experiment_name}-${log_task_name}-${robot.asset.robot_type}
save_dir: ${experiment_dir}/.hydra
force_flat_terrain: false
use_wandb: true
log_task_name: decoupled_locomotion
sim_type: isaacgym
env_spacing: 20
output_dir: ${experiment_dir}/output
eval_overrides:
  headless: false
  num_envs: 1
  auto_load_latest: false
  use_wandb: false
  env:
    config:
      max_episode_length_s: 100000
algo:
  _target_: humanoidverse.agents.decouple.ppo_decoupled_wbc_ma.PPOMultiActorCritic
  _recursive_: false
  config:
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    actor_learning_rate: 0.0001
    critic_learning_rate: 0.0001
    weight_decay: 0.01
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
    desired_kl: 0.01
    num_steps_per_env: 24
    save_interval: 100
    load_optimizer: true
    init_noise_std:
      lower_body: 0.8
      upper_body: 0.6
    num_learning_iterations: 10000
    init_at_random_ep_len: true
    eval_callbacks: null
    log_all_action_std: true
    module_dict:
      actor_lower_body:
        input_dim:
        - actor_obs
        history_length: ${obs.history_length}
        output_dim:
        - robot_action_dim
        layer_config:
          type: MLP
          hidden_dims:
          - 512
          - 256
          - 128
          activation: ELU
      actor_upper_body:
        input_dim:
        - actor_obs
        history_length: ${obs.history_length}
        output_dim:
        - robot_action_dim
        layer_config:
          type: MLP
          hidden_dims:
          - 512
          - 256
          - 128
          activation: ELU
      critic:
        type: MLP
        input_dim:
        - critic_obs
        history_length: ${obs.history_length}
        output_dim:
        - 1
        layer_config:
          type: MLP
          hidden_dims:
          - 512
          - 256
          - 128
          activation: ELU
env:
  _target_: humanoidverse.envs.decoupled_locomotion.decoupled_locomotion_stand_height_waist_wbc_ma_diff_force.LeggedRobotDecoupledLocomotionStanceHeightWBCForce
  _recursive_: false
  config:
    experiment_name: ${experiment_name}
    num_envs: ${num_envs}
    headless: ${headless}
    simulator: ${simulator}
    save_rendering_dir: null
    ckpt_dir: null
    analysis: false
    eval_force_level: 0
    robot: ${robot}
    domain_rand: ${domain_rand}
    rewards: ${rewards}
    terrain: ${terrain}
    obs: ${obs}
    env_spacing: 5.0
    max_episode_length_s: 20
    normalization:
      clip_actions: 100.0
      clip_observations: 100.0
    termination:
      terminate_when_close_to_dof_pos_limit: false
      terminate_when_close_to_dof_vel_limit: false
      terminate_when_close_to_torque_limit: false
      terminate_by_contact: false
      terminate_by_gravity: true
      terminate_by_low_height: true
      terminate_when_motion_end: true
      terminate_when_low_upper_dof_tracking: false
    termination_scales:
      termination_close_to_dof_pos_limit: 0.98
      termination_close_to_dof_vel_limit: 0.98
      termination_close_to_torque_limit: 0.98
      termination_min_base_height: 0.3
      termination_gravity_x: 0.8
      termination_gravity_y: 0.8
      terminate_when_low_upper_dof_tracking_threshold: 0.1
    locomotion_obs_scales:
      lin_vel: 1.0
      ang_vel: 1.0
      dof_pos: 1.0
      dof_vel: 1.0
      humanoid_commands_scale: 1.0
    locomotion_command_ranges:
      lin_vel_x:
      - -1.0
      - 1.0
      lin_vel_y:
      - -1.0
      - 1.0
      ang_vel_yaw:
      - -1.0
      - 1.0
      heading:
      - -3.14
      - 3.14
      base_height:
      - -0.25
      - 0.0
    stand_prob: 0.4
    tapping_in_place_prob: 0.0
    fix_upper_body_prob: 0.3
    apply_waist_roll_only_when_stance: true
    apply_waist_pitch_only_when_stance: true
    apply_waist_yaw_only_when_stance: true
    fix_waist_yaw: true
    fix_waist_roll: true
    fix_waist_pitch: true
    fix_waist_yaw_range:
    - -1.0
    - 1.0
    fix_waist_roll_range:
    - -0.0
    - 0.0
    fix_waist_pitch_range:
    - -0.0
    - 0.0
    zero_fix_waist_yaw_prob: 0.1
    zero_fix_waist_roll_prob: 1.0
    zero_fix_waist_pitch_prob: 1.0
    resample_motion_when_training: true
    resample_time_interval_s: 2000
    locomotion_command_resampling_time: 10.0
    obs_history:
      history_len: 0
    residual_upper_body_action: true
    max_force_estimation: true
    update_apply_force_phase: true
    use_lpf: false
    force_filter_alpha: 0.05
    zero_tapping_xy_force: false
    zero_force_prob:
    - 0.25
    - 0.25
    - 0.25
    random_force_prob: 0.0
    apply_force_x_range:
    - -40.0
    - 40.0
    apply_force_y_range:
    - -40.0
    - 40.0
    apply_force_z_range:
    - -50.0
    - 5.0
    apply_force_pos_ratio_range:
    - 0.0
    - 1.0
    lower_body_force_compensation: false
    apply_force_in_physics_step: true
    apply_force_compensation_in_physics_step: false
    randomize_force_duration:
    - 150
    - 250
    only_apply_z_force_when_walking: false
    only_apply_resistance_when_walking: true
